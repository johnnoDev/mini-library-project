<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <ul>
        {% for author in author_list %}
            <li>
                <a href="{% url 'author_detail' pk=author.id_author %}">
                    {{ author.name }}
                </a>
            </li>
        {% empty %}
            <li>No hay registros de autores.</li>
        {% endfor %}
    </ul>
</body>
</html>
